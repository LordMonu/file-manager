services:
  - type: web
    name: manage-files-api
    runtime: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run start
    preDeployCommand: npm run db:migrate
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: STORAGE_DRIVER
        value: spaces
      - key: DATABASE_URL
        fromDatabase:
          name: manage-files-db
          property: connectionString
      - key: DO_SPACES_ENDPOINT
        sync: false
      - key: DO_SPACES_REGION
        sync: false
      - key: DO_SPACES_KEY
        sync: false
      - key: DO_SPACES_SECRET
        sync: false
      - key: DO_SPACES_BUCKET
        sync: false
      - key: DO_SPACES_PUBLIC_BASE_URL
        sync: false
      - key: UPLOAD_URL_EXPIRES_SECONDS
        value: 900
      - key: READ_URL_EXPIRES_SECONDS
        value: 300
      - key: MAX_UPLOAD_SIZE_MB
        value: 200
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 120
      - key: UPLOAD_RATE_LIMIT_MAX_REQUESTS
        value: 20
      - key: AUTH_MODE
        value: api-key
      - key: ADMIN_API_KEY
        sync: false
      - key: CLIENT_API_KEY
        sync: false
      - key: CLIENT_API_KEY_CLIENT_IDS
        sync: false

databases:
  - name: manage-files-db
    plan: starter
    databaseName: manage_files
    user: manage_files_user
